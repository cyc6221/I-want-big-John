<style>
.stats-539 {
  display: grid;
  gap: 1rem;
  margin-top: 1.25rem;
}

.stats-539-grid {
  display: grid;
  gap: 1rem;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
}

.stats-539-card,
.stats-539-panel {
  border: 1px solid rgba(0, 0, 0, 0.08);
  border-radius: 14px;
  background: linear-gradient(180deg, #ffffff 0%, #f7f8fc 100%);
  box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
}

.stats-539-card {
  padding: 1rem;
}

.stats-539-card strong {
  display: block;
  font-size: 1.35rem;
  line-height: 1.2;
  color: #132238;
}

.stats-539-label {
  display: block;
  margin-bottom: 0.35rem;
  font-size: 0.9rem;
  color: #5d6b82;
}

.stats-539-meta {
  margin-top: 0.35rem;
  font-size: 0.85rem;
  color: #6b7280;
}

.stats-539-panel {
  padding: 1rem;
}

.stats-539-head {
  display: flex;
  flex-wrap: wrap;
  gap: 0.8rem;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.9rem;
}

.stats-539-head h2 {
  margin: 0;
  font-size: 1.15rem;
}

.stats-539-controls {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.stats-539-pill {
  border: 1px solid rgba(15, 23, 42, 0.12);
  border-radius: 999px;
  background: #fff;
  color: #334155;
  padding: 0.45rem 0.8rem;
  font-size: 0.92rem;
  font-weight: 700;
  cursor: pointer;
}

.stats-539-pill.is-active {
  background: #132238;
  border-color: #132238;
  color: #fff;
}

.stats-539-chart-box {
  position: relative;
  width: 100%;
  height: 400px;
}

.stats-539-caption {
  margin: 0.75rem 0 0;
  color: #64748b;
  font-size: 0.9rem;
}

.stats-539-window {
  display: grid;
  gap: 0.45rem;
  margin-top: 0.9rem;
}

.stats-539-window-head {
  display: flex;
  justify-content: space-between;
  gap: 0.75rem;
  align-items: center;
  font-size: 0.9rem;
  color: #64748b;
}

.stats-539-window input[type="range"] {
  width: 100%;
}

.stats-539-window-controls {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.stats-539-window-toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
  align-items: center;
  justify-content: space-between;
}

.stats-539-window-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.stats-539-date-range {
  display: grid;
  gap: 0.5rem;
  margin-top: 0.75rem;
}

.stats-539-date-fields {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  align-items: center;
}

.stats-539-date-fields input[type="date"] {
  padding: 0.45rem 0.6rem;
  border: 1px solid rgba(15, 23, 42, 0.12);
  border-radius: 10px;
  font: inherit;
  color: #334155;
  background: #fff;
}

@media screen and (max-width: 640px) {
  .stats-539-chart-box {
    height: 320px;
  }
}
</style>

<section class="stats-539" id="stats-649-root">
  <div class="stats-539-grid" id="stats-649-summary"></div>

  <div class="stats-539-panel">
    <div class="stats-539-head">
      <h2 id="stats-649-chart-title">銷售總額走勢</h2>
      <div class="stats-539-controls" id="stats-649-periods">
        <button class="stats-539-pill is-active" data-period="yearly" type="button">年</button>
        <button class="stats-539-pill" data-period="monthly" type="button">月</button>
        <button class="stats-539-pill" data-period="weekly" type="button">週</button>
        <button class="stats-539-pill" data-period="daily" type="button">日</button>
      </div>
    </div>

    <div class="stats-539-controls" id="stats-649-metrics" style="margin-bottom:0.9rem;">
      <button class="stats-539-pill is-active" data-metric="sales" type="button">銷售總額</button>
      <button class="stats-539-pill" data-metric="bets" type="button">銷售注數</button>
      <button class="stats-539-pill" data-metric="prize" type="button">總獎金</button>
    </div>

    <div class="stats-539-chart-box">
      <canvas id="chart-649-timeseries"></canvas>
    </div>

    <div class="stats-539-window" id="stats-649-window-wrap" hidden>
      <div class="stats-539-window-toolbar">
        <div class="stats-539-window-controls" id="stats-649-window-size">
          <button class="stats-539-pill" data-window-size="50" type="button">50 筆</button>
          <button class="stats-539-pill is-active" data-window-size="100" type="button">100 筆</button>
          <button class="stats-539-pill" data-window-size="200" type="button">200 筆</button>
          <button class="stats-539-pill" data-window-size="300" type="button">300 筆</button>
          <button class="stats-539-pill" data-window-size="500" type="button">500 筆</button>
          <button class="stats-539-pill" data-window-size="1000" type="button">1000 筆</button>
          <button class="stats-539-pill" data-window-size="all" type="button">全部</button>
        </div>
        <div class="stats-539-window-actions">
          <button class="stats-539-pill" id="stats-649-zoom-out" type="button">-</button>
          <button class="stats-539-pill" id="stats-649-zoom-in" type="button">+</button>
          <button class="stats-539-pill" id="stats-649-window-prev" type="button">&lt;&lt;</button>
          <button class="stats-539-pill" id="stats-649-window-next" type="button">&gt;&gt;</button>
        </div>
      </div>
      <div class="stats-539-window-head">
        <span>顯示區間</span>
        <span id="stats-649-window-label"></span>
      </div>
      <input id="stats-649-window-range" type="range" min="0" max="0" step="1" value="0">
      <div class="stats-539-date-range">
        <div class="stats-539-window-head">
          <span>自訂日期區間</span>
          <span id="stats-649-date-label"></span>
        </div>
        <div class="stats-539-date-fields">
          <input id="stats-649-date-start" type="date">
          <span>到</span>
          <input id="stats-649-date-end" type="date">
          <button class="stats-539-pill" id="stats-649-date-apply" type="button">套用</button>
          <button class="stats-539-pill" id="stats-649-date-reset" type="button">重設</button>
        </div>
      </div>
    </div>

    <p class="stats-539-caption" id="stats-649-caption"></p>
  </div>
</section>

<script>
(() => {
  if (window.__lotto649StatsInit) return;
  window.__lotto649StatsInit = true;

  const DATA_URL = '{{ "/assets/data/649-stats.json" | relative_url }}';
  const metricConfig = {
    sales: { label: '銷售總額', unit: '元', axisUnit: '億元', color: '#b45309', axisDivisor: 100000000 },
    bets: { label: '銷售注數', unit: '注', axisUnit: '萬注', color: '#2563eb', axisDivisor: 10000 },
    prize: { label: '總獎金', unit: '元', axisUnit: '億元', color: '#0f766e', axisDivisor: 100000000 }
  };
  const periodConfig = {
    daily: { label: '日' },
    weekly: { label: '週' },
    monthly: { label: '月' },
    yearly: { label: '年' }
  };

  let chart;
  let payload;
  let currentPeriod = 'yearly';
  let currentMetric = 'sales';
  let visiblePoints = 100;
  let currentWindowStart = 0;
  let customDateStart = '';
  let customDateEnd = '';
  const windowSizeOptions = [50, 100, 200, 300, 500, 1000, 'all'];

  function loadChartJs() {
    return new Promise((resolve, reject) => {
      if (window.Chart) return resolve();
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js';
      script.onload = () => resolve();
      script.onerror = () => reject(new Error('Failed to load Chart.js'));
      document.head.appendChild(script);
    });
  }

  function formatNumber(value) {
    return Number(value || 0).toLocaleString('zh-Hant-TW');
  }

  function formatRate(value) {
    return `${(Number(value || 0) * 100).toFixed(2)}%`;
  }

  function formatAxisValue(value, metricInfo) {
    if (metricInfo.axisDivisor) {
      return `${(Number(value || 0) / metricInfo.axisDivisor).toLocaleString('zh-Hant-TW', {
        maximumFractionDigits: 1
      })}`;
    }
    return formatNumber(value);
  }

  function renderSummary(summary) {
    const root = document.getElementById('stats-649-summary');
    if (!root || !summary) return;

    const cards = [
      { label: '資料期間', value: `${summary.date_start} 至 ${summary.date_end}` },
      { label: '總期數', value: formatNumber(summary.total_draws) },
      { label: '平均單期銷售總額', value: `${formatNumber(summary.avg_sales)} 元` },
      { label: '平均單期銷售注數', value: `${formatNumber(summary.avg_bets)} 注` },
      { label: '平均單期總獎金', value: `${formatNumber(summary.avg_prize)} 元` },
      { label: '整體獎金率', value: formatRate(summary.overall_prize_rate) }
    ];

    root.innerHTML = cards.map((card) => `
      <div class="stats-539-card">
        <span class="stats-539-label">${card.label}</span>
        <strong>${card.value}</strong>
      </div>
    `).join('');
  }

  function setActive(containerId, attrName, dataKey, activeValue) {
    const root = document.getElementById(containerId);
    if (!root) return;
    root.querySelectorAll('[data-' + attrName + ']').forEach((node) => {
      node.classList.toggle('is-active', node.dataset[dataKey] === activeValue);
    });
  }

  function getWindowSize(totalCount) {
    if (visiblePoints === 'all') return totalCount;
    return Math.max(1, Math.min(Number(visiblePoints || 100), totalCount));
  }

  function getWindowStep(totalCount) {
    return Math.max(1, Math.floor(getWindowSize(totalCount) * 0.5));
  }

  function setWindowSize(nextSize) {
    visiblePoints = nextSize;
    const series = getFilteredSeries();
    currentWindowStart = Math.max(0, series.length - getWindowSize(series.length));
    renderChart();
  }

  function getFilteredSeries() {
    const series = (((payload || {}).series || {})[currentPeriod] || []).slice();
    if (!customDateStart && !customDateEnd) return series;

    return series.filter((item) => {
      const date = item.date || item.label;
      if (customDateStart && date < customDateStart) return false;
      if (customDateEnd && date > customDateEnd) return false;
      return true;
    });
  }

  function syncDateInputs(series) {
    const startInput = document.getElementById('stats-649-date-start');
    const endInput = document.getElementById('stats-649-date-end');
    const label = document.getElementById('stats-649-date-label');
    if (!startInput || !endInput || !label) return;

    const firstDate = series[0]?.date || '';
    const lastDate = series[series.length - 1]?.date || '';

    if (!startInput.dataset.bound) {
      startInput.dataset.bound = 'true';
      startInput.value = customDateStart || firstDate;
    }
    if (!endInput.dataset.bound) {
      endInput.dataset.bound = 'true';
      endInput.value = customDateEnd || lastDate;
    }

    startInput.min = firstDate;
    startInput.max = lastDate;
    endInput.min = firstDate;
    endInput.max = lastDate;

    if (!customDateStart && !customDateEnd) {
      label.textContent = '全期間';
      startInput.value = firstDate;
      endInput.value = lastDate;
    } else {
      label.textContent = `${customDateStart || firstDate} 到 ${customDateEnd || lastDate}`;
      startInput.value = customDateStart || firstDate;
      endInput.value = customDateEnd || lastDate;
    }
  }

  function updateCaption(series, metric) {
    const summary = payload.summary || {};
    const latest = series[series.length - 1];
    const metricInfo = metricConfig[metric];
    const caption = document.getElementById('stats-649-caption');
    if (!caption) return;
    if (!latest) {
      caption.textContent = '目前區間沒有資料。';
      return;
    }

    caption.textContent =
      `目前顯示 ${periodConfig[currentPeriod].label} 資料，最新區間 ${latest.label}，` +
      `${metricInfo.label} ${formatNumber(latest[metric])} ${metricInfo.unit}。` +
      `最近 30 期平均：${formatNumber((summary.recent_30_avg || {})[metric])} ${metricInfo.unit}。` +
      `${metricInfo.axisUnit ? ` 縱軸以${metricInfo.axisUnit}顯示。` : ''}`;
  }

  function updateWindowControls(series) {
    const wrap = document.getElementById('stats-649-window-wrap');
    const range = document.getElementById('stats-649-window-range');
    const label = document.getElementById('stats-649-window-label');
    const prev = document.getElementById('stats-649-window-prev');
    const next = document.getElementById('stats-649-window-next');
    const zoomOut = document.getElementById('stats-649-zoom-out');
    const zoomIn = document.getElementById('stats-649-zoom-in');
    if (!wrap || !range || !label) return;

    const windowSize = getWindowSize(series.length);
    const maxStart = Math.max(0, series.length - windowSize);
    currentWindowStart = Math.min(Math.max(0, currentWindowStart), maxStart);
    range.min = '0';
    range.max = String(maxStart);
    range.value = String(currentWindowStart);
    setActive('stats-649-window-size', 'window-size', 'windowSize', String(visiblePoints));

    if (series.length <= windowSize) {
      wrap.hidden = true;
      label.textContent = `1 - ${series.length}`;
      return;
    }

    wrap.hidden = false;
    const end = Math.min(series.length, currentWindowStart + windowSize);
    label.textContent = `${currentWindowStart + 1} - ${end} / ${series.length}`;
    if (prev) prev.disabled = currentWindowStart <= 0;
    if (next) next.disabled = currentWindowStart >= maxStart;
    const sizeIndex = windowSizeOptions.findIndex((item) => String(item) === String(visiblePoints));
    if (zoomOut) zoomOut.disabled = sizeIndex <= 0;
    if (zoomIn) zoomIn.disabled = sizeIndex >= windowSizeOptions.length - 1;
  }

  function renderChart() {
    const fullSeries = getFilteredSeries();
    const metricInfo = metricConfig[currentMetric];
    const title = document.getElementById('stats-649-chart-title');

    if (title) title.textContent = `${metricInfo.label}走勢`;
    setActive('stats-649-periods', 'period', 'period', currentPeriod);
    setActive('stats-649-metrics', 'metric', 'metric', currentMetric);
    syncDateInputs((((payload || {}).series || {})[currentPeriod] || []));
    updateWindowControls(fullSeries);

    const windowSize = getWindowSize(fullSeries.length);
    const series = fullSeries.slice(currentWindowStart, currentWindowStart + windowSize);
    updateCaption(series, currentMetric);

    const labels = series.map((item) => item.label);
    const values = series.map((item) => Number(item[currentMetric] || 0));
    const canvas = document.getElementById('chart-649-timeseries');
    if (!canvas) return;

    if (!series.length) {
      if (chart) {
        chart.destroy();
        chart = null;
      }
      return;
    }

    const chartOptions = {
      responsive: true,
      maintainAspectRatio: false,
      animation: {
        duration: 380,
        easing: 'easeOutCubic'
      },
      interaction: {
        mode: 'index',
        intersect: false
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: (items) => items[0]?.label || '',
            label: (ctx) => `${metricInfo.label}: ${formatNumber(ctx.raw)} ${metricInfo.unit}`
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: {
            maxTicksLimit: Math.min(8, labels.length),
            autoSkip: true
          }
        },
        y: {
          beginAtZero: false,
          title: {
            display: true,
            text: metricInfo.axisUnit || metricInfo.unit
          },
          ticks: {
            maxTicksLimit: 6,
            callback: (value) => formatAxisValue(value, metricInfo)
          }
        }
      }
    };

    if (!chart) {
      chart = new Chart(canvas, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: metricInfo.label,
            data: values,
            borderColor: metricInfo.color,
            backgroundColor: metricInfo.color + '22',
            pointRadius: currentPeriod === 'daily' ? 0 : 2,
            pointHoverRadius: 4,
            borderWidth: 2,
            tension: 0.2,
            fill: true
          }]
        },
        options: chartOptions
      });
      return;
    }

    chart.data.labels = labels;
    chart.data.datasets[0].label = metricInfo.label;
    chart.data.datasets[0].data = values;
    chart.data.datasets[0].borderColor = metricInfo.color;
    chart.data.datasets[0].backgroundColor = metricInfo.color + '22';
    chart.data.datasets[0].pointRadius = currentPeriod === 'daily' ? 0 : 2;
    chart.options = chartOptions;
    chart.update();
  }

  function bindControls() {
    const periodRoot = document.getElementById('stats-649-periods');
    const metricRoot = document.getElementById('stats-649-metrics');
    const range = document.getElementById('stats-649-window-range');
    const windowSizeRoot = document.getElementById('stats-649-window-size');
    const prev = document.getElementById('stats-649-window-prev');
    const next = document.getElementById('stats-649-window-next');
    const zoomOut = document.getElementById('stats-649-zoom-out');
    const zoomIn = document.getElementById('stats-649-zoom-in');
    const applyDate = document.getElementById('stats-649-date-apply');
    const resetDate = document.getElementById('stats-649-date-reset');
    const startInput = document.getElementById('stats-649-date-start');
    const endInput = document.getElementById('stats-649-date-end');

    if (periodRoot) {
      periodRoot.addEventListener('click', (event) => {
        const button = event.target.closest('[data-period]');
        if (!button) return;
        currentPeriod = button.dataset.period;
        customDateStart = '';
        customDateEnd = '';
        const series = getFilteredSeries();
        currentWindowStart = Math.max(0, series.length - getWindowSize(series.length));
        renderChart();
      });
    }

    if (metricRoot) {
      metricRoot.addEventListener('click', (event) => {
        const button = event.target.closest('[data-metric]');
        if (!button) return;
        currentMetric = button.dataset.metric;
        renderChart();
      });
    }

    if (range) {
      range.addEventListener('input', (event) => {
        currentWindowStart = Number(event.target.value || 0);
        renderChart();
      });
    }

    if (windowSizeRoot) {
      windowSizeRoot.addEventListener('click', (event) => {
        const button = event.target.closest('[data-window-size]');
        if (!button) return;
        setWindowSize(button.dataset.windowSize === 'all' ? 'all' : Number(button.dataset.windowSize));
      });
    }

    if (prev) {
      prev.addEventListener('click', () => {
        const series = getFilteredSeries();
        currentWindowStart = Math.max(0, currentWindowStart - getWindowStep(series.length));
        renderChart();
      });
    }

    if (next) {
      next.addEventListener('click', () => {
        const series = getFilteredSeries();
        const maxStart = Math.max(0, series.length - getWindowSize(series.length));
        currentWindowStart = Math.min(maxStart, currentWindowStart + getWindowStep(series.length));
        renderChart();
      });
    }

    if (zoomOut) {
      zoomOut.addEventListener('click', () => {
        const currentIndex = windowSizeOptions.findIndex((item) => String(item) === String(visiblePoints));
        if (currentIndex > 0) setWindowSize(windowSizeOptions[currentIndex - 1]);
      });
    }

    if (zoomIn) {
      zoomIn.addEventListener('click', () => {
        const currentIndex = windowSizeOptions.findIndex((item) => String(item) === String(visiblePoints));
        if (currentIndex < windowSizeOptions.length - 1) setWindowSize(windowSizeOptions[currentIndex + 1]);
      });
    }

    if (applyDate && startInput && endInput) {
      applyDate.addEventListener('click', () => {
        const start = startInput.value || '';
        const end = endInput.value || '';
        if (start && end && start > end) return;
        customDateStart = start;
        customDateEnd = end;
        const series = getFilteredSeries();
        currentWindowStart = Math.max(0, series.length - getWindowSize(series.length));
        renderChart();
      });
    }

    if (resetDate) {
      resetDate.addEventListener('click', () => {
        customDateStart = '';
        customDateEnd = '';
        const series = getFilteredSeries();
        currentWindowStart = Math.max(0, series.length - getWindowSize(series.length));
        renderChart();
      });
    }
  }

  async function init() {
    try {
      const response = await fetch(DATA_URL, { cache: 'no-store' });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      payload = await response.json();
      await loadChartJs();

      renderSummary(payload.summary);
      const initialSeries = (payload.series || {})[currentPeriod] || [];
      currentWindowStart = Math.max(0, initialSeries.length - getWindowSize(initialSeries.length));
      bindControls();
      renderChart();
    } catch (error) {
      console.error('649 stats load failed:', error);
      const root = document.getElementById('stats-649-root');
      if (root) root.innerHTML = '<p>649 統計資料載入失敗。</p>';
    }
  }

  init();
})();
</script>
