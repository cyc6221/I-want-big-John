<style>
.chart-wrap{ max-width:100%; overflow:hidden; min-width:0; }
.chart-box{ position:relative; height:360px; width:100%; min-width:0; }
.chart-box canvas{ width:100% !important; height:100% !important; display:block; }
</style>

<div class="chart-wrap" style="margin: 1rem 0;">
  <h2 style="margin: .2rem 0 .8rem 0;">選號次數 vs 中獎次數</h2>
  <div class="chart-box">
    <canvas id="chartCountWin"></canvas>
  </div>
</div>

<script>
(() => {
  const U = window.__instantsChosenUtil;

  window.__instantsChosenDataPromise.then(data => {
    if (!data.length || window.__instantsChosenError) return;

    const labels   = data.map(it => String(it.chosen_number ?? ''));
    const times    = data.map(it => U.toNum(it.times));
    const winTimes = data.map(it => U.toNum(it.win_times));

    new Chart(document.getElementById('chartCountWin'), {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: '次數', data: times },
          { label: '中獎次數', data: winTimes }
        ]
      },
      options: U.commonBarOptions('次數')
    });
  });
})();
</script>
