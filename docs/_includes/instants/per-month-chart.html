<div class="card" style="padding:1rem; margin-top:1rem;">
  <h2 style="margin:.2rem 0 .8rem 0;">每月花費與中獎圖表</h2>

  <div class="chart-box" style="position:relative; width:100%; height:360px;">
    <canvas id="instantsMonthBar"></canvas>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<script>
(() => {
  const EVENT_NAME = "instants:perMonth:ready";
  const fmtMonth = (m) => (m || "").replace("-", "/");

  function render(data, error){
    if(error) return;

    const canvas = document.getElementById("instantsMonthBar");
    if(!canvas) return;

    const labels = (data || []).map(d => fmtMonth(d.month));
    const spent  = (data || []).map(d => Number(d.spent || 0));
    const prize  = (data || []).map(d => Number(d.prize || 0));

    new Chart(canvas, {
      type: "bar",
      data: {
        labels,
        datasets: [
          { label: "花費", data: spent },
          { label: "中獎", data: prize }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          y: {
            beginAtZero: true,
            ticks: { callback: (v) => Number(v).toLocaleString("zh-TW") }
          }
        },
        plugins: {
          tooltip: {
            callbacks: {
              label: (ctx) => `${ctx.dataset.label}: ${Number(ctx.raw).toLocaleString("zh-TW")}`
            }
          },
          legend: { position: "top" }
        }
      }
    });
  }

  if(Array.isArray(window.instantsPerMonth)){
    render(window.instantsPerMonth, null);
    return;
  }

  window.addEventListener(EVENT_NAME, (e) => {
    render(e.detail?.data || [], e.detail?.error || null);
  }, { once: true });
})();
</script>
