<div class="table-wrap">
  <table class="table table--striped" id="chosenTable">
    <thead>
      <tr>
        <th style="text-align:center;">選號</th>
        <th style="text-align:center;">次數</th>
        <th style="text-align:center;">中獎次數</th>
        <th style="text-align:center;">花費</th>
        <th style="text-align:center;">中獎金額</th>
      </tr>
    </thead>
    <tbody>
      <tr><td colspan="5" style="text-align:center; opacity:.7;">載入中…</td></tr>
    </tbody>
  </table>
</div>

<hr>

<!-- 圖 1：選號次數 + 中獎次數 -->
<div class="chart-wrap" style="margin: 1rem 0;">
  <h3 style="margin:.2rem 0 .6rem 0;">選號次數 vs 中獎次數</h3>
  <canvas id="chartCountWin" height="120"></canvas>
</div>

<!-- 圖 2：花費金額 + 中獎金額 -->
<div class="chart-wrap" style="margin: 1rem 0;">
  <h3 style="margin:.2rem 0 .6rem 0;">花費金額 vs 中獎金額</h3>
  <canvas id="chartSpentPrize" height="120"></canvas>
</div>

<script>
(() => {
  const DATA_URL = '{{ "/assets/data/instants-chosen-number.json" | relative_url }}';

  const tbody = document.querySelector('#chosenTable tbody');

  // ====== Chart.js loader (CDN) ======
  function loadChartJs(){
    return new Promise((resolve, reject) => {
      if (window.Chart) return resolve();
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js';
      s.onload = () => resolve();
      s.onerror = () => reject(new Error('Failed to load Chart.js'));
      document.head.appendChild(s);
    });
  }

  fetch(DATA_URL)
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(async data => {
      // ====== 表格 ======
      tbody.innerHTML = '';

      for (const it of data) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="text-align:center;">${escapeHtml(it.chosen_number ?? '')}</td>
          <td style="text-align:center;">${num(it.times)}</td>
          <td style="text-align:center;">${num(it.win_times)}</td>
          <td style="text-align:center;">${num(it.spent)}</td>
          <td style="text-align:center;">${num(it.prize_amount)}</td>
        `;
        tbody.appendChild(tr);
      }

      if (!data.length) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; opacity:.7;">目前沒有資料</td></tr>`;
        return;
      }

      // ====== 準備圖表資料 ======
      const labels     = data.map(it => String(it.chosen_number ?? ''));
      const times      = data.map(it => toNum(it.times));
      const winTimes   = data.map(it => toNum(it.win_times));
      const spent      = data.map(it => toNum(it.spent));
      const prizeAmt   = data.map(it => toNum(it.prize_amount));

      // ====== 畫圖 ======
      await loadChartJs();

      // Chart 1: times + win_times
      new Chart(document.getElementById('chartCountWin'), {
        type: 'bar',
        data: {
          labels,
          datasets: [
            { label: '次數', data: times },
            { label: '中獎次數', data: winTimes }
          ]
        },
        options: commonBarOptions({ yTitle: '次數' })
      });

      // Chart 2: spent + prize_amount
      new Chart(document.getElementById('chartSpentPrize'), {
        type: 'bar',
        data: {
          labels,
          datasets: [
            { label: '花費', data: spent },
            { label: '中獎金額', data: prizeAmt }
          ]
        },
        options: commonBarOptions({ yTitle: '金額（元）' })
      });
    })
    .catch(err => {
      tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#b00;">讀取失敗：${escapeHtml(String(err))}</td></tr>`;
      console.error(err);
    });

  function commonBarOptions(extra = {}){
    return {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: true },
        tooltip: { enabled: true }
      },
      scales: {
        x: {
          ticks: { maxRotation: 60, minRotation: 30 },
          grid: { display: false }
        },
        y: {
          beginAtZero: true,
          title: { display: !!extra.yTitle, text: extra.yTitle || '' }
        }
      }
    };
  }

  function toNum(x){
    const n = Number(x);
    return Number.isFinite(n) ? n : 0;
  }

  function num(x){
    const n = Number(x);
    return Number.isFinite(n) ? n.toLocaleString('zh-Hant-TW') : (x ?? '');
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }
})();
</script>
