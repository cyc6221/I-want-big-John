<div class="chart-wrap" style="margin: 1rem 0;">
  <h3 style="margin:.2rem 0 .6rem 0;">花費金額 vs 中獎金額</h3>
  <div class="chart-box">
    <canvas id="chartSpentPrize"></canvas>
  </div>
</div>

<script>
(() => {
  const U = window.__instantsChosenUtil;

  window.__instantsChosenDataPromise.then(data => {
    if (!data.length || window.__instantsChosenError) return;

    const labels   = data.map(it => String(it.chosen_number ?? ''));
    const spent    = data.map(it => U.toNum(it.spent));
    const prizeAmt = data.map(it => U.toNum(it.prize_amount));

    new Chart(document.getElementById('chartSpentPrize'), {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: '花費', data: spent },
          { label: '中獎金額', data: prizeAmt }
        ]
      },
      options: U.commonBarOptions('金額（元）')
    });
  });
})();
</script>
